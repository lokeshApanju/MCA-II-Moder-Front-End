<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="shortcut icon" href="loki.jpg" type="image/x-icon">
</head>
<body>

    <div class="container">
        <div class="card">
            <h1><i class="fas fa-lock"></i> Password Generator</h1>

            <!-- Password Display -->
            <div class="password-box">
                <input type="text" id="password" placeholder="Click Generate..." readonly>
                <button class="copy-btn" id="copyBtn" title="Copy Password">
                    <i class="fas fa-copy"></i>
                </button>
            </div>

            <!-- Strength Indicator -->
            <div class="strength-container">
                <span>Strength:</span>
                <div class="strength-bar">
                    <div class="strength-fill" id="strengthFill"></div>
                </div>
                <span id="strengthText">-</span>
            </div>

            <!-- Settings -->
            <div class="settings">

                <!-- Password Length -->
                <div class="setting-item">
                    <label>Password Length: <span id="lengthValue">12</span></label>
                    <input type="range" id="lengthSlider" min="4" max="32" value="12">
                </div>

                <!-- Checkboxes -->
                <div class="checkboxes">
                    <label class="checkbox-label">
                        <input type="checkbox" id="uppercase" checked>
                        <span class="checkmark"></span>
                        Uppercase (A-Z)
                    </label>

                    <label class="checkbox-label">
                        <input type="checkbox" id="lowercase" checked>
                        <span class="checkmark"></span>
                        Lowercase (a-z)
                    </label>

                    <label class="checkbox-label">
                        <input type="checkbox" id="numbers" checked>
                        <span class="checkmark"></span>
                        Numbers (0-9)
                    </label>

                    <label class="checkbox-label">
                        <input type="checkbox" id="symbols">
                        <span class="checkmark"></span>
                        Symbols (!@#$)
                    </label>
                </div>

            </div>

            <!-- Generate Button -->
            <button class="generate-btn" id="generateBtn">
                <i class="fas fa-key"></i> Generate Password
            </button>

            <!-- Toast Notification -->
            <div class="toast" id="toast">
                <i class="fas fa-check-circle"></i> Password Copied!
            </div>

        </div>
    </div>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <div class="footer-container">

            <!-- Profile Section -->
            <div class="footer-profile">
                <div class="footer-avatar">
                    <i class="fas fa-user-circle"></i>
                </div>
                <div class="footer-info">
                    <h3 class="footer-name">Lokesh Developer</h3>
                    <p class="footer-title">
                        <i class="fas fa-code"></i> Full Stack Developer
                    </p>
                </div>
            </div>

            <div class="footer-divider"></div>

            <!-- Contact Section -->
            <div class="footer-section">
                <h4 class="footer-heading">
                    <i class="fas fa-address-book"></i> Contact
                </h4>
                <ul class="footer-contact-list">
                    <li>
                        <a href="mailto:lokeshlk@gmail.com" class="footer-link">
                            <span class="footer-icon email-icon">
                                <i class="fas fa-envelope"></i>
                            </span>
                            lokeshlk@gmail.com
                        </a>
                    </li>
                    <li>
                        <a href="tel:+91 7974799739" class="footer-link">
                            <span class="footer-icon phone-icon">
                                <i class="fas fa-phone"></i>
                            </span>
                            +91 7974799739
                        </a>
                    </li>
                </ul>
            </div>

            <div class="footer-divider"></div>

            <!-- Social Media Section -->
            <div class="footer-section">
                <h4 class="footer-heading">
                    <i class="fas fa-share-alt"></i> Follow Me
                </h4>
                <div class="social-grid">

                    <a href="https://github.com/lokeshApanju" 
                       target="_blank" 
                       class="social-card github" 
                       title="GitHub">
                        <i class="fab fa-github"></i>
                        <span>GitHub</span>
                    </a>

                    <a href="https://linkedin.com/in/lokesh-sahu79" 
                       target="_blank" 
                       class="social-card linkedin" 
                       title="LinkedIn">
                        <i class="fab fa-linkedin-in"></i>
                        <span>LinkedIn</span>
                    </a>

                    <a href="https://instagram.com/tha_lokesh_panju_79" 
                       target="_blank" 
                       class="social-card instagram" 
                       title="Instagram">
                        <i class="fab fa-instagram"></i>
                        <span>Instagram</span>
                    </a>
                </div>
            </div>

            <div class="footer-divider"></div>

            <!-- Copyright -->
            <div class="footer-bottom">
                <p>
                    <i class="fas fa-copyright"></i> 
                    <span id="year"></span> Loki Developer. All rights reserved.
                </p>
                <p class="footer-made">
                    Made with <i class="fas fa-heart heart-beat"></i> 
                    using HTML, CSS & JS
                </p>
            </div>

        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
